<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500"><stop offset="0%" stop-color="#0A0A0A"/><stop offset="100%" stop-color="#111118"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#F8FAFC" letter-spacing="1">KNOWLEDGE GRAPH</text>
  <line x1="320" y1="44" x2="480" y2="44" stroke="#3F3F46" stroke-width="1"/>
  <!-- Central hub -->
  <circle cx="400" cy="250" r="45" fill="#1A1A2E" stroke="#818CF8" stroke-width="1.5"/>
  <circle cx="400" cy="250" r="3" fill="#818CF8"/>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818CF8">OpenBrain</text>
  <text x="400" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">Memory Graph</text>
  <!-- Clusters -->
  <!-- Episodic cluster -->
  <circle cx="160" cy="120" r="35" fill="#1A1A2E" stroke="#818CF8" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="160" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#818CF8">Episodic</text>
  <text x="160" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">tool:search_memories</text>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">tool:create_skill</text>
  <line x1="190" y1="145" x2="362" y2="220" stroke="#818CF8" stroke-width="0.5" opacity="0.3"/>
  <!-- Semantic cluster -->
  <circle cx="400" cy="80" r="35" fill="#1A1A2E" stroke="#34D399" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="400" y="77" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#34D399">Semantic</text>
  <text x="400" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">concepts, facts</text>
  <line x1="400" y1="115" x2="400" y2="205" stroke="#34D399" stroke-width="0.5" opacity="0.3"/>
  <!-- Procedural cluster -->
  <circle cx="640" cy="120" r="35" fill="#1A1A2E" stroke="#FBBF24" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="640" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FBBF24">Procedural</text>
  <text x="640" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">skills, workflows</text>
  <line x1="610" y1="145" x2="438" y2="220" stroke="#FBBF24" stroke-width="0.5" opacity="0.3"/>
  <!-- Decision cluster -->
  <circle cx="90" cy="320" r="35" fill="#1A1A2E" stroke="#F472B6" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="90" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#F472B6">Decision</text>
  <text x="90" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">arch decisions</text>
  <line x1="120" y1="295" x2="362" y2="265" stroke="#F472B6" stroke-width="0.5" opacity="0.3"/>
  <!-- Bug cluster -->
  <circle cx="250" cy="400" r="35" fill="#1A1A2E" stroke="#22D3EE" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="250" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#22D3EE">Bug</text>
  <text x="250" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">errors, fixes</text>
  <line x1="275" y1="370" x2="365" y2="285" stroke="#22D3EE" stroke-width="0.5" opacity="0.3"/>
  <!-- Reflection cluster -->
  <circle cx="550" cy="400" r="35" fill="#1A1A2E" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="550" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#F59E0B">Reflection</text>
  <text x="550" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">lessons, patterns</text>
  <line x1="525" y1="370" x2="435" y2="285" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
  <!-- Workspace cluster -->
  <circle cx="710" cy="320" r="35" fill="#1A1A2E" stroke="#A78BFA" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="710" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#A78BFA">Workspace</text>
  <text x="710" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#52525B">project structure</text>
  <line x1="680" y1="295" x2="438" y2="265" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>
  <!-- Legend -->
  <rect x="610" y="455" width="160" height="30" rx="4" fill="#18181B" stroke="#3F3F46" stroke-width="0.5"/>
  <text x="620" y="470" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">Each node = memory type</text>
  <text x="620" y="482" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">Edges = cross-references</text>
</svg>