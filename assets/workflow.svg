<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500"><stop offset="0%" stop-color="#0A0A0A"/><stop offset="100%" stop-color="#111118"/></linearGradient>
    <linearGradient id="purp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818CF8"/><stop offset="100%" stop-color="#6C5CE7"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#F8FAFC" letter-spacing="1">DATA FLOW</text>
  <line x1="340" y1="44" x2="460" y2="44" stroke="#3F3F46" stroke-width="1"/>
  <!-- Step 1: Tool Execution -->
  <rect x="50" y="70" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#818CF8" stroke-width="0.8"/>
  <circle cx="65" cy="95" r="10" fill="#818CF8" opacity="0.2"/>
  <text x="65" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">1</text>
  <text x="82" y="90" font-family="system-ui, sans-serif" font-size="11" fill="#818CF8">User invokes</text>
  <text x="82" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#818CF8">a tool</text>
  <text x="210" y="100" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">search_memories</text>
  <text x="210" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">list_skills</text>
  <text x="210" y="128" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">create_skill</text>
  <!-- Arrow -->
  <line x1="350" y1="95" x2="420" y2="95" stroke="#3F3F46" stroke-width="1"/>
  <polygon points="418,91 426,95 418,99" fill="#3F3F46"/>
  <!-- Step 2: Plugin Hooks -->
  <rect x="430" y="70" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#34D399" stroke-width="0.8"/>
  <circle cx="445" cy="95" r="10" fill="#34D399" opacity="0.2"/>
  <text x="445" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">2</text>
  <text x="462" y="90" font-family="system-ui, sans-serif" font-size="11" fill="#34D399">Plugin hooks</text>
  <text x="462" y="106" font-family="system-ui, sans-serif" font-size="11" fill="#34D399">trigger</text>
  <text x="610" y="95" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">tool.execute.after</text>
  <text x="610" y="109" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">→ episodic memory</text>
  <!-- Arrow down -->
  <line x1="510" y1="120" x2="510" y2="160" stroke="#3F3F46" stroke-width="1"/>
  <polygon points="506,158 510,164 514,158" fill="#3F3F46"/>
  <!-- Step 3: Chat -->
  <rect x="430" y="170" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#FBBF24" stroke-width="0.8"/>
  <circle cx="445" cy="195" r="10" fill="#FBBF24" opacity="0.2"/>
  <text x="445" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">3</text>
  <text x="462" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#FBBF24">Chat message</text>
  <text x="462" y="206" font-family="system-ui, sans-serif" font-size="11" fill="#FBBF24">sent</text>
  <text x="610" y="195" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">system.transform</text>
  <text x="610" y="209" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">→ context injection</text>
  <!-- Arrow down -->
  <line x1="510" y1="220" x2="510" y2="260" stroke="#3F3F46" stroke-width="1"/>
  <polygon points="506,258 510,264 514,258" fill="#3F3F46"/>
  <!-- Step 4: Engines -->
  <rect x="430" y="270" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#22D3EE" stroke-width="0.8"/>
  <circle cx="445" cy="295" r="10" fill="#22D3EE" opacity="0.2"/>
  <text x="445" y="299" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">4</text>
  <text x="462" y="290" font-family="system-ui, sans-serif" font-size="11" fill="#22D3EE">Engines</text>
  <text x="462" y="306" font-family="system-ui, sans-serif" font-size="11" fill="#22D3EE">process</text>
  <text x="610" y="295" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">Memory / Reflection</text>
  <text x="610" y="309" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">Learning / Context</text>
  <!-- Arrow down -->
  <line x1="510" y1="320" x2="510" y2="360" stroke="#3F3F46" stroke-width="1"/>
  <polygon points="506,358 510,364 514,358" fill="#3F3F46"/>
  <!-- Step 5: Storage -->
  <rect x="430" y="370" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#A78BFA" stroke-width="0.8"/>
  <circle cx="445" cy="395" r="10" fill="#A78BFA" opacity="0.2"/>
  <text x="445" y="399" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">5</text>
  <text x="462" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#A78BFA">SQLite</text>
  <text x="462" y="406" font-family="system-ui, sans-serif" font-size="11" fill="#A78BFA">persisted</text>
  <text x="610" y="395" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">~/.opencode/openbrain/</text>
  <text x="610" y="409" font-family="system-ui, sans-serif" font-size="9" fill="#52525B">openbrain.db</text>
  <!-- Left side: Dream Engine -->
  <line x1="510" y1="420" x2="510" y2="445" stroke="#3F3F46" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="510" y1="445" x2="250" y2="445" stroke="#3F3F46" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="250" y1="445" x2="250" y2="420" stroke="#3F3F46" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="246,422 250,416 254,422" fill="#3F3F46"/>
  <rect x="170" y="395" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#F472B6" stroke-width="0.8"/>
  <circle cx="185" cy="420" r="10" fill="#F472B6" opacity="0.2"/>
  <text x="185" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">♻</text>
  <text x="202" y="415" font-family="system-ui, sans-serif" font-size="11" fill="#F472B6">Dream Engine</text>
  <text x="202" y="431" font-family="system-ui, sans-serif" font-size="11" fill="#F472B6">every 5 min</text>
  <text x="126" y="398" font-family="system-ui, sans-serif" font-size="8" fill="#52525B">dedup</text>
  <text x="126" y="410" font-family="system-ui, sans-serif" font-size="8" fill="#52525B">compress</text>
  <text x="126" y="422" font-family="system-ui, sans-serif" font-size="8" fill="#52525B">promote</text>
  <text x="126" y="434" font-family="system-ui, sans-serif" font-size="8" fill="#52525B">archive</text>
  <!-- Bottom: Session idle -->
  <line x1="510" y1="270" x2="160" y2="270" stroke="#3F3F46" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="270" x2="160" y2="130" stroke="#3F3F46" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="156,132 160,126 164,132" fill="#3F3F46"/>
  <rect x="80" y="150" width="160" height="50" rx="6" fill="#1A1A2E" stroke="#EC4899" stroke-width="0.8"/>
  <circle cx="95" cy="175" r="10" fill="#EC4899" opacity="0.2"/>
  <text x="95" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F8FAFC">6</text>
  <text x="112" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#EC4899">Session idle</text>
  <text x="112" y="186" font-family="system-ui, sans-serif" font-size="11" fill="#EC4899">→ Reflect</text>
</svg>