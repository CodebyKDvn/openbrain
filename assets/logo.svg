  <circle cx="38" cy="20" r="1" fill="#818CF8" opacity="0.4"/>
  <circle cx="44" cy="32" r="1" fill="#818CF8" opacity="0.4"/>
  <circle cx="38" cy="44" r="1" fill="#818CF8" opacity="0.4"/>
  <circle cx="26" cy="44" r="1" fill="#818CF8" opacity="0.4"/>
