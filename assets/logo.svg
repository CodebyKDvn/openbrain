  <line x1="20" y1="40" x2="20" y2="24" stroke="#818CF8" stroke-width="0.8" opacity="0.5"/>
  <line x1="20" y1="24" x2="32" y2="16" stroke="#818CF8" stroke-width="0.8" opacity="0.5"/>
