  <circle cx="44" cy="24" r="2.5" fill="url(#g1)"/>
  <circle cx="44" cy="40" r="2.5" fill="url(#g1)"/>
  <circle cx="32" cy="48" r="3.5" fill="url(#g1)"/>
  <circle cx="20" cy="40" r="2.5" fill="url(#g1)"/>
  <circle cx="20" cy="24" r="2.5" fill="url(#g1)"/>
