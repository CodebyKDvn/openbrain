  <line x1="32" y1="16" x2="32" y2="27" stroke="#34D399" stroke-width="0.7" opacity="0.6"/>
  <line x1="44" y1="24" x2="36" y2="30" stroke="#34D399" stroke-width="0.7" opacity="0.6"/>
